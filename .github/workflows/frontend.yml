name: Frontend

env:
  working-directory: ./frontend
  server:
  # port:
  # protocol:
  username:
  # remote-root:

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  repository_dispatch:
    types: [deploy]

concurrency: frontend

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - uses: pnpm/action-setup@v2
        name: Install pnpm
        id: pnpm-install
        with:
          version: 7.27.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm i
        working-directory: ${{ env.working-directory }}

      - name: Build project
        run: pnpm generate:prod
        working-directory: ${{ env.working-directory }}

      # https://github.com/SamKirkland/FTP-Deploy-Action
      - name: Deploy project (FTP)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ env.server }}
          # port: ${{ env.port }}
          # protocol: ${{ env.protocol }}
          # server-dir: ${{ env.remote-root }}
          username: ${{ env.username }}
          local-dir: frontend/dist/
          password: ${{ secrets.FRONTEND_PASSWORD }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            /.user.ini
            /.well-known
            /.well-known/**
            /php.ini
            /prepend.inc.php

      # https://github.com/easingthemes/ssh-deploy
      # - name: Deploy project (SSH)
      #   uses: easingthemes/ssh-deploy@v4.0.5
      #   env:
      #     SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
      #     ARGS: "-avzr --delete"
      #     SOURCE: "frontend/dist/"
      #     REMOTE_HOST: ${{ env.server }}
      #     # REMOTE_PORT: ${{ env.port }}
      #     REMOTE_USER: ${{ env.username }}
      #     # TARGET: ${{ env.remote-root }}
      #     EXCLUDE: "/.user.ini, /.well-known, /php.ini, /prepend.inc.php"
